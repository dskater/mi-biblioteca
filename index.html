<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA - Biblioteca Cloud Compacta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <style>
        :root { --primary: #bb86fc; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        #status { color: #03dac6; font-weight: bold; margin: 15px 0; min-height: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        /* Estilos de la Tarjeta - AJUSTADOS */
        .book-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; height: 100%; }
        .book-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        /* Imagen más pequeña (antes 380px, ahora 250px) */
        .cover { width: 100%; height: 250px; object-fit: cover; background: #252525; }
        
        .info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { color: var(--primary); font-weight: bold; margin-bottom: 5px; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .author { color: #aaa; font-size: 0.85rem; margin-bottom: 10px; font-style: italic; }
        
        /* Más Sinopsis (antes 4 líneas, ahora 12 líneas) */
        .synopsis { color: #ccc; font-size: 0.85rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 12; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 15px; text-align: justify; }
        
        .btn-download { background: #03dac6; color: #000; border: none; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; cursor: pointer; text-decoration: none; margin-top: auto; width: 100%; display: block; }
        .btn-download:hover { background: #018786; }
        
        .pagination-bar { margin: 40px 0; text-align: center; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .loader { border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mi Biblioteca Digital</h1>
        <button id="auth_btn" class="btn-main">CONECTAR DRIVE</button>
    </header>
    <div id="status">Iniciando sistema...</div>
    <div id="loader" class="loader"></div>
    <div id="viewer" class="grid"></div>
    <div class="pagination-bar">
        <button id="next_btn" class="btn-main" style="display:none;">CARGAR MÁS LIBROS</button>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyBfnX_FzxyIYWj_rE5x8ggQCIa6LU9oVqA';
    const CLIENT_ID = '580589042015-lt7lblgj6gn99flar43touqmedg6t0m8.apps.googleusercontent.com';
    const FOLDER_ID = '1415n3CdO_yMWZE1Nn-_Ts6Iqw3Eqr3Ky';
    
    let accessToken = null, tokenClient = null, currentNextPageToken = null;

    function initGAPI() {
        gapi.load('client', async () => {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
            document.getElementById('status').innerText = 'APIs listas. Conecta para ver libros.';
        });
    }

    function initGIS() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.readonly',
            callback: (resp) => { 
                if (resp.access_token) { 
                    accessToken = resp.access_token; 
                    document.getElementById('viewer').innerHTML = ''; // Limpiar al conectar
                    currentNextPageToken = null; // Reiniciar paginación
                    processLibrary(); 
                } 
            }
        });
    }

    document.getElementById('auth_btn').onclick = () => tokenClient.requestAccessToken();
    document.getElementById('next_btn').onclick = () => processLibrary();

    async function processLibrary() {
        document.getElementById('auth_btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('next_btn').style.display = 'none';
        document.getElementById('status').innerText = 'Accediendo a la carpeta...';

        try {
            const response = await gapi.client.drive.files.list({
                q: `'${FOLDER_ID}' in parents and mimeType = 'application/epub+zip'`,
                fields: 'nextPageToken, files(id, name)',
                pageSize: 6, // Libros por página
                pageToken: currentNextPageToken 
            });

            const files = response.result.files;
            currentNextPageToken = response.result.nextPageToken;

            for (const file of files) {
                try {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    if (!res.ok) throw new Error('Error de red');
                    const blob = await res.blob();
                    const buffer = await blob.arrayBuffer();
                    const book = ePub(buffer);
                    const meta = await book.loaded.metadata;
                    const cover = await book.coverUrl();
                    renderBook(meta, cover, file.id, file.name);
                } catch (err) { console.warn("Fallo procesando:", file.name); }
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').innerText = currentNextPageToken ? 'Carga parcial lista.' : 'Biblioteca completa.';
            if (currentNextPageToken) document.getElementById('next_btn').style.display = 'inline-block';
        } catch (e) { 
            console.error(e);
            document.getElementById('status').innerText = 'Error general de conexión.';
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderBook(meta, cover, fileId, filename) {
        const card = document.createElement('div');
        card.className = 'book-card';
        const desc = meta.description ? meta.description.replace(/<[^>]*>?/gm, '') : 'Sin sinopsis disponible.';
        card.innerHTML = `
            <img src="${cover || ''}" class="cover" onerror="this.src='https://via.placeholder.com/300x450?text=SIN+PORTADA'">
            <div class="info">
                <div class="title" title="${meta.title || filename}">${meta.title || filename}</div>
                <div class="author">${meta.creator || 'Autor desconocido'}</div>
                <div class="synopsis">${desc}</div>
                <button onclick="downloadFile('${fileId}', '${filename}')" class="btn-download">DESCARGAR</button>
            </div>`;
        document.getElementById('viewer').appendChild(card);
    }

    async function downloadFile(fileId, filename) {
        const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
        const response = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
        const blob = await response.blob();
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    }

    window.onload = () => {
        const s1 = document.createElement('script'); s1.src = "https://apis.google.com/js/api.js"; s1.onload = initGAPI; document.body.appendChild(s1);
        const s2 = document.createElement('script'); s2.src = "https://accounts.google.com/gsi/client"; s2.onload = initGIS; document.body.appendChild(s2);
    };
</script>
</body>
</html>
