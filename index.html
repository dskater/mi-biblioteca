<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA - Mi Biblioteca Cloud</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #334155; }
        
        .btn-auth { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-auth:hover { background: #2563eb; transform: scale(1.05); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .book-card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .cover { width: 100%; height: 350px; object-fit: cover; background: #334155; }
        .info { padding: 15px; flex-grow: 1; }
        .title { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; color: #60a5fa; }
        .author { font-size: 0.9em; color: #94a3b8; font-style: italic; }
        
        #status { color: #10b981; font-weight: bold; margin-bottom: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Mi Biblioteca Digital</h1>
            <p>Explorador automático de archivos EPUB en Drive</p>
        </div>
        <button id="auth_button" class="btn-auth">Conectar con Google Drive</button>
    </header>

    <div id="status"></div>
    <div id="loader" class="loader"></div>
    
    <div id="viewer" class="grid"></div>
</div>

<script>
    // CREDENCIALES DE TU PROYECTO
    const API_KEY = 'TU_API_KEY_AQUI'; 
    const CLIENT_ID = 'TU_CLIENT_ID_AQUI.apps.googleusercontent.com';
    const FOLDER_ID = '1415n3CdO_yMWZE1Nn-_Ts6Iqw3Eqr3Ky';

    const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

    function handleClientLoad() {
        gapi.load('client:auth2', initClient);
    }

    async function initClient() {
        await gapi.client.init({
            apiKey: API_KEY,
            clientId: CLIENT_ID,
            discoveryDocs: DISCOVERY_DOCS,
            scope: SCOPES
        });
        
        document.getElementById('auth_button').onclick = () => {
            gapi.auth2.getAuthInstance().signIn().then(processLibrary);
        };
    }

    async function processLibrary() {
        document.getElementById('auth_button').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('status').innerText = 'Escaneando carpeta...';

        try {
            // CICLO 1: Listar archivos
            const response = await gapi.client.drive.files.list({
                q: `'${FOLDER_ID}' in parents and mimeType = 'application/epub+zip'`,
                fields: 'files(id, name)'
            });

            const files = response.result.files;
            
            // CICLO 2: Extraer metadata de cada uno
            for (const file of files) {
                document.getElementById('status').innerText = `Procesando: ${file.name}`;
                
                const res = await gapi.client.drive.files.get({
                    fileId: file.id,
                    alt: 'media'
                });

                const book = ePub(res.body);
                const metadata = await book.loaded.metadata;
                const cover = await book.coverUrl();

                renderBook(metadata, cover);
            }
            
            document.getElementById('status').innerText = 'Biblioteca cargada con éxito.';
            document.getElementById('loader').style.display = 'none';

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = 'Error al cargar la biblioteca.';
        }
    }

    function renderBook(meta, cover) {
        const viewer = document.getElementById('viewer');
        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
            <img src="${cover || 'https://via.placeholder.com/300x450?text=Sin+Portada'}" class="cover">
            <div class="info">
                <div class="title">${meta.title}</div>
                <div class="author">${meta.creator}</div>
            </div>
        `;
        viewer.appendChild(card);
    }

    handleClientLoad();
</script>

</body>
</html>
